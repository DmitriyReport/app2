<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АвтоПравоНСК</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f0f4f8 0%, #dde5ed 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .container {
            max-width: 1300px;
            width: 100%;
            background: white;
            border-radius: 60px;
            box-shadow: 0 30px 60px -20px rgba(0, 20, 40, 0.4);
            padding: 40px 40px 30px;
        }

        /* Шапка */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-block {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-img {
            height: 80px;
            width: auto;
            max-width: 200px;
            object-fit: contain;
        }

        .phone {
            background: #1a2c3e;
            padding: 15px 35px;
            border-radius: 60px;
            box-shadow: 0 10px 0 #0e1a24;
        }

        .phone a {
            color: white;
            text-decoration: none;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 2px;
        }

        /* Сетка для кнопок-изображений */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 40px 0;
        }

        /* Стиль для кнопок-картинок */
        .image-button {
            width: 100%;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 15px 25px -10px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            background: #f8f9fa;
            border: 3px solid white;
        }

        .image-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 22px 30px -10px rgba(0, 0, 0, 0.4);
        }

        .image-button:active {
            transform: translateY(0);
        }

        .image-button img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        /* Специальные размеры для некоторых кнопок */
        .span-2 {
            grid-column: span 2;
        }

        /* Блок полезных сервисов */
        .services {
            background: #e8f0f8;
            border-radius: 50px;
            padding: 30px;
            margin: 40px 0 30px;
            box-shadow: inset 0 2px 10px white, inset 0 -5px 10px #b5c9db;
        }

        .services-title {
            font-size: 2rem;
            font-weight: 700;
            color: #162b3a;
            margin-bottom: 25px;
            padding-left: 10px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        /* Футер */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 30px;
            border-top: 2px dashed #a0b8cc;
            color: #2b4a64;
            flex-wrap: wrap;
            gap: 20px;
        }

        .footer-links {
            display: flex;
            gap: 35px;
        }

        .footer-links a {
            color: #1f3c54;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            border-bottom: 2px solid transparent;
        }

        .footer-links a:hover {
            border-bottom-color: currentColor;
        }

        .copyright {
            font-size: 1rem;
            opacity: 0.8;
        }

        /* Адаптация */
        @media (max-width: 1000px) {
            .buttons-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .services-grid {
                grid-template-columns: 1fr;
            }
            .phone a {
                font-size: 2rem;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px 15px;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .buttons-grid {
                grid-template-columns: 1fr;
            }
            .span-2 {
                grid-column: span 1;
            }
            .footer {
                flex-direction: column;
                text-align: center;
            }
            .footer-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 20px;
            }
        }
    </style>
</head>
